<div class="container mx-auto flex justify-center items-center mt-8">
    <div class="grid md:grid-cols-2 gap-6 w-full max-w-4xl">
        <!-- Left Side: Map & Location -->
        <div class="border rounded-lg p-4 bg-gray-100 shadow">
            <h5 class="text-lg font-semibold">📍 Equipment Location</h5>
            <p class="mt-2"><strong>Latitude:</strong> {{ equipment.latitude }}</p>
            <p><strong>Longitude:</strong> {{ equipment.longitude }}</p>
            <p><strong>Address:</strong> {{ equipment.address }}</p>
            <div id="map" class="h-48 mt-3 rounded-md shadow"></div>
            <p class="text-sm text-gray-500 mt-2">🖱 Drag the marker to update location.</p>
        </div>

        <!-- Right Side: Form -->
        <div class="border rounded-lg p-4 bg-white shadow">
            <h5 class="text-lg font-semibold">🛠 Add New Equipment</h5>
            <form (ngSubmit)="saveEquipment()" class="mt-4 space-y-3">
                <div>
                    <label class="block font-medium">Equipment Name</label>
                    <input type="text" class="w-full px-3 py-2 border rounded-md focus:outline-blue-500" 
                        [(ngModel)]="equipment.name" name="name" placeholder="Enter equipment name" required>
                </div>
                
                <div>
                    <label class="block font-medium">Equipment Type</label>
                    <input type="text" class="w-full px-3 py-2 border rounded-md focus:outline-blue-500" 
                        [(ngModel)]="equipment.type" name="type" placeholder="Enter type (e.g., Tractor, Harvester)" required>
                </div>

                <div>
                    <label class="block font-medium">Address</label>
                    <input type="text" class="w-full px-3 py-2 border rounded-md bg-gray-100" 
                        [(ngModel)]="equipment.address" name="address" readonly>
                </div>

                <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 mt-3">
                     Submit
                </button>
            </form>
        </div>
    </div>
</div>
